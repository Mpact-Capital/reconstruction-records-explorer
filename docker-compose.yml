services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: rre
      POSTGRES_PASSWORD: rre
      POSTGRES_DB: rre
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql

volumes:
  pg_data:
